name: ccaf_practice_exam
description: "CCA-F Practice Exam App"
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0
  google_mobile_ads: ^5.2.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"
  windows:
    generate: true
    image_path: "assets/images/app_icon.jpg"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.jpg
    - .env
